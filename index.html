<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Per Te</title>
    <meta
      name="description"
      content="Un piccolo spazio romantico, personale e protetto da password."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="background-glow background-glow-one"></div>
      <div class="background-glow background-glow-two"></div>

      <main class="app">
        <section class="gate" id="gate" aria-labelledby="gate-title">
          <div class="gate__card">
            <p class="eyebrow">Uno spazio creato solo per voi due</p>
            <h1 id="gate-title">Benvenuta nel nostro piccolo rifugio</h1>
            <p class="gate__intro">
              Inserisci la password per aprire questo regalo digitale pensato
              con calma, amore e attenzione ai dettagli.
            </p>

            <form class="gate__form" id="password-form">
              <label class="gate__label" for="password-input">Password</label>
              <div class="gate__input-row">
                <input
                  class="gate__input"
                  id="password-input"
                  name="password"
                  type="password"
                  placeholder="Scrivi la password"
                  autocomplete="current-password"
                  required
                />
                <button class="button button--primary" type="submit">
                  Entra
                </button>
              </div>
              <p class="gate__hint" id="password-message" aria-live="polite"></p>
            </form>
          </div>
        </section>

        <section class="content hidden" id="content">
          <header class="hero">
            <div class="hero__text">
              <p class="eyebrow">Per la persona che rende tutto piu bello</p>
              <h1 id="site-title">Per Noi</h1>
              <p class="hero__subtitle" id="site-subtitle"></p>
            </div>
            <div class="hero__card">
              <p class="hero__quote" id="hero-quote"></p>
            </div>
          </header>

          <section class="panel gallery-panel" aria-labelledby="gallery-title">
            <div class="section-heading">
              <p class="eyebrow">I nostri momenti</p>
              <h2 id="gallery-title">Galleria fotografica</h2>
            </div>

            <div class="gallery">
              <div class="gallery__stage">
                <div class="gallery__image-frame">
                  <img
                    id="gallery-image"
                    class="gallery__image"
                    src=""
                    alt=""
                  />
                </div>
                <div class="gallery__copy">
                  <p class="gallery__index" id="gallery-index"></p>
                  <h3 class="gallery__caption" id="gallery-caption"></h3>
                  <p class="gallery__description" id="gallery-description"></p>
                </div>
              </div>

              <div class="gallery__controls">
                <button
                  class="button button--ghost"
                  type="button"
                  id="prev-button"
                  aria-label="Foto precedente"
                >
                  Precedente
                </button>
                <button
                  class="button button--ghost"
                  type="button"
                  id="next-button"
                  aria-label="Foto successiva"
                >
                  Successiva
                </button>
              </div>

              <div class="gallery__dots" id="gallery-dots" aria-label="Seleziona una foto"></div>
            </div>
          </section>

          <section class="panel letter-panel" aria-labelledby="letter-title">
            <div class="section-heading">
              <p class="eyebrow">Parole per te</p>
              <h2 id="letter-title">Lettera</h2>
            </div>

            <article class="letter" id="letter-body"></article>
          </section>
        </section>
      </main>
    </div>

    <script src="./site-data.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
